# Decap CMS configuration for momento.motion
# Edit content lives in /content/*.json. After the client saves, Decap commits
# to the Git repo and GitHub Pages redeploys automatically.
#
# Auth is handled by DecapBridge (https://decapbridge.com) since the site is
# static on GitHub Pages. See README.md for the DecapBridge setup steps.

# Use DecapBridge classic auth (required)
backend:
  name: git-gateway
  repo: aleeeksanndraa/momento-motion
  branch: main
  identity_url: https://auth.decapbridge.com/sites/868a1332-12f6-478a-96d2-b0bc16fcd8cc
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://aleeeksanndraa.github.io/momento-motion/

# Where uploaded images are stored / served from
media_folder: "assets/uploads"
public_folder: "assets/uploads"

collections:
  # ---------- SITE (social links, tickets, contact, legal) ----------
  - name: "site"
    label: "Site & Links"
    files:
      - name: "site"
        label: "Site settings"
        file: "content/site.json"
        fields:
          - label: "Genres"
            name: "brand"
            widget: "object"
            fields:
              - { label: "Genres", name: "genres", widget: "string" }
              - { label: "Descriptor", name: "descriptor", widget: "string" }
          - label: "Social links"
            name: "social"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
          - label: "Ticket links"
            name: "ticketLinks"
            widget: "object"
            fields:
              - { label: "Resident Advisor", name: "residentAdvisor", widget: "string" }
              - { label: "Eventbrite", name: "eventbrite", widget: "string" }
          - { label: "Waitlist Form URL", name: "waitlistFormUrl", widget: "string", required: false, hint: "The Google Apps Script Web App URL from the waitlist setup. Leave blank until deployed." }
          - label: "Contact"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Email", name: "email", widget: "string" }
              - { label: "Instagram", name: "instagram", widget: "string" }
              - { label: "Resident Advisor", name: "residentAdvisor", widget: "string" }
              - { label: "Eventbrite", name: "eventbrite", widget: "string" }
          - label: "Legal"
            name: "legal"
            widget: "object"
            fields:
              - { label: "Copyright", name: "copyright", widget: "string" }
              - { label: "Credit", name: "credit", widget: "string" }

  # ---------- SEO ----------
  # Kept in its own file/collection (rather than nested inside events.json or epk.json)
  # since Decap CMS file collections can silently drop fields that aren't part of the
  # collection's own schema on save. A separate content/seo.json avoids that risk.
  - name: "seo"
    label: "SEO"
    files:
      - name: "seo"
        label: "SEO Settings"
        file: "content/seo.json"
        fields:
          - label: "Events Page (index.html)"
            name: "events"
            widget: "object"
            fields:
              - { label: "Page Title", name: "title", widget: "string", hint: "Shown in Google search results and browser tabs. Synced into the site automatically after saving." }
              - { label: "Meta Description", name: "description", widget: "text", hint: "Shown under the title in Google search results. Aim for under 160 characters." }
              - { label: "Social Share Description", name: "ogDescription", widget: "text", required: false, hint: "Shown when this page is shared on Instagram, WhatsApp, Slack, etc. Optional - falls back to Meta Description if left blank." }
          - label: "EPK Page (epk.html)"
            name: "epk"
            widget: "object"
            fields:
              - { label: "Page Title", name: "title", widget: "string", hint: "Shown in Google search results and browser tabs. Synced into the site automatically after saving." }
              - { label: "Meta Description", name: "description", widget: "text", hint: "Shown under the title in Google search results. Aim for under 160 characters." }

  # ---------- EVENTS PAGE ----------
  - name: "events"
    label: "Events Page"
    files:
      - name: "events"
        label: "Events content"
        file: "content/events.json"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Location", name: "location", widget: "string" }
              - { label: "Subtext", name: "subtext", widget: "text" }
          - label: "Philosophy"
            name: "philosophy"
            widget: "object"
            fields:
              - { label: "Line 1", name: "line1", widget: "string" }
              - { label: "Line 2", name: "line2", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
          - label: "Upcoming event"
            name: "upcoming"
            widget: "object"
            fields:
              - { label: "Tag", name: "tag", widget: "string" }
              - { label: "Poster image", name: "poster", widget: "image" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Date", name: "date", widget: "string" }
              - { label: "Time", name: "time", widget: "string" }
              - { label: "Venue", name: "venue", widget: "string" }
              - { label: "City", name: "city", widget: "string" }
              - { label: "Sound label", name: "soundLabel", widget: "string" }
              - { label: "Sound / genres", name: "sound", widget: "list", field: { label: "Item", name: "item", widget: "string" } }
              - { label: "Resident Advisor URL", name: "residentAdvisorUrl", widget: "string" }
              - { label: "Eventbrite URL", name: "eventbriteUrl", widget: "string" }
          - label: "Future Events — Section Label"
            name: "moreDates"
            widget: "object"
            fields:
              - { label: "Number", name: "number", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
          - label: "Future Events — Event Cards"
            name: "upcomingList"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Meta line", name: "meta", widget: "string" }
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "URL", name: "url", widget: "string" }
          - label: "Sound identity"
            name: "sound"
            widget: "object"
            fields:
              - { label: "Body", name: "body", widget: "text" }
              - { label: "Tagline", name: "tagline", widget: "string" }
              - { label: "Mix URL (SoundCloud track/set link)", name: "mixUrl", widget: "string" }
          - label: "Artists"
            name: "artists"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Body 1", name: "body1", widget: "text" }
              - { label: "Body 2", name: "body2", widget: "text" }
              - { label: "Tags", name: "tags", widget: "list", field: { label: "Tag", name: "tag", widget: "string" } }
          - label: "Past events"
            name: "pastEvents"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Meta line", name: "meta", widget: "string", required: false }
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "Type", name: "type", widget: "select", options: ["poster", "photo", "video"] }

  # ---------- EPK PAGE ----------
  - name: "epk"
    label: "EPK Page"
    files:
      - name: "epk"
        label: "EPK content"
        file: "content/epk.json"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Subtext", name: "subtext", widget: "text" }
              - { label: "EPK PDF", name: "epkPdf", widget: "file" }
          - label: "Quick facts"
            name: "facts"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Value", name: "value", widget: "string" }
          - label: "About"
            name: "about"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Body paragraphs", name: "body", widget: "list", field: { label: "Paragraph", name: "p", widget: "text" } }
          - label: "Philosophy"
            name: "philosophy"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Body paragraphs", name: "body", widget: "list", field: { label: "Paragraph", name: "p", widget: "text" } }
          - label: "Pillars"
            name: "pillars"
            widget: "list"
            fields:
              - { label: "Index", name: "index", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Body paragraphs", name: "body", widget: "list", field: { label: "Paragraph", name: "p", widget: "text" } }
          - label: "Media archive"
            name: "media"
            widget: "list"
            fields:
              - { label: "Code", name: "code", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Icon", name: "icon", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
              - { label: "Highlight", name: "highlight", widget: "boolean", required: false }
          - label: "Team"
            name: "team"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Role", name: "role", widget: "string" }
              - { label: "Bio", name: "bio", widget: "text" }
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "Image focus point", name: "focus", widget: "string", required: false, hint: "CSS object-position, e.g. \"50% 50%\" (center), \"50% 20%\" (higher up). Adjust if a face gets cropped oddly." }
          - label: "Contact"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Body", name: "body", widget: "text" }
